<mat-toolbar color="primary" class="toolbar">
  <span>Dashboard</span>
  <span class="spacer"></span>

  <mat-form-field appearance="outline" subscriptSizing="dynamic" class="dark-theme-field">
    <mat-label>Integration</mat-label>
    <mat-select [value]="'Airtable'">
      <mat-option value="Airtable">Airtable</mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="outline" subscriptSizing="dynamic" class="dark-theme-field">
    <mat-label>Entity (Collection)</mat-label>
    <mat-select [value]="baseId" (selectionChange)="onEntityChange($event.value)">
      @for (base of bases(); track base.id) {
        <mat-option [value]="base.id">{{ base.name }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  <mat-form-field
    appearance="outline"
    subscriptSizing="dynamic"
    class="search-field dark-theme-field"
  >
    <mat-label>Search Data</mat-label>
    <input matInput placeholder="Keyword..." [formControl]="searchControl" />

    @if (searchControl.value) {
      <button mat-icon-button matSuffix (click)="searchControl.setValue('')" aria-label="Clear search">
        <mat-icon>close</mat-icon>
      </button>
    } @else {
      <mat-icon matSuffix>search</mat-icon>
    }
  </mat-form-field>
</mat-toolbar>

<div class="content-container">
  @if (isSyncing()) {
    <div class="center-content"><mat-spinner></mat-spinner><p>Syncing data...</p></div>
  } @else {
    <div class="grid-header">
      <h3>Tickets Data</h3>
      <button
        mat-stroked-button
        color="primary"
        (click)="syncCurrentBase()"
        [disabled]="isSyncing()"
      >
        <mat-icon>refresh</mat-icon> Resync Data
      </button>
    </div>

    <div class="grid-wrapper" style="display: flex; flex-direction: column; height: 100%;">
      <ag-grid-angular
        style="flex: 1"
        class="ag-theme-alpine custom-grid"
        [columnDefs]="columnDefs()"
        [rowModelType]="'infinite'"
        [pagination]="true"
        [paginationPageSize]="20"
        [cacheBlockSize]="20"
        (gridReady)="onGridReady($event)"
        (cellClicked)="onCellClicked($event)"
      >
      </ag-grid-angular>

      <div class="grid-footer">
        <span>Total Rows: {{ totalRows() }}</span>
      </div>
    </div>
  }
</div>
