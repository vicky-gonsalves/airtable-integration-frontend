<div class="login-wrapper">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title class="card-title">Airtable Data Sync Demo</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      @if (isChecking()) {
        <div class="spinner-container">
          <mat-spinner diameter="40"></mat-spinner>
          <p>Checking authentication...</p>
        </div>
      } @else {
        <p class="error-msg">Connect your Airtable account to start syncing your data.</p>
        <button mat-raised-button color="primary" (click)="connectAirtable()">
          Connect Airtable
        </button>
      }
    </mat-card-content>
  </mat-card>
</div>
