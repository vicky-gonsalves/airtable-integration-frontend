<h2 mat-dialog-title>Airtable Authentication</h2>
<mat-dialog-content>
  <form [formGroup]="form" style="display: flex; flex-direction: column; gap: 16px; margin-top: 8px;">
    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email">
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Password</mat-label>
      <input matInput type="password" formControlName="password">
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>MFA Code</mat-label>
      <input matInput formControlName="mfaCode">
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-raised-button color="primary" [disabled]="form.invalid" (click)="submit()">Authenticate</button>
</mat-dialog-actions>
